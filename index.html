<style>

/* BUTTON */

.hero-buttons{
margin-top:45px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.btn{
padding:18px 42px;
border-radius:18px;
text-decoration:none;
font-weight:700;
transition:0.4s;
font-size:15px;
letter-spacing:1px;
position:relative;
overflow:hidden;
}

.btn-primary{
background:linear-gradient(135deg,#00e5ff,#0077ff);
color:white;
box-shadow:
0 0 25px rgba(0,229,255,0.45),
0 0 60px rgba(0,119,255,0.25);
}

.btn-primary:hover{
transform:translateY(-5px) scale(1.03);
box-shadow:
0 0 40px rgba(0,229,255,0.75),
0 0 80px rgba(0,119,255,0.4);
}

.btn-outline{
border:1px solid rgba(255,255,255,0.18);
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
color:white;
}

.btn-outline:hover{
background:rgba(255,255,255,0.12);
}

/* LOADING SCREEN */

#loadingScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(
135deg,
rgba(1,8,25,0.98),
rgba(2,20,45,0.98)
);
display:flex;
justify-content:center;
align-items:center;
z-index:999999;
opacity:0;
visibility:hidden;
transition:0.5s;
backdrop-filter:blur(15px);
}

#loadingScreen.active{
opacity:1;
visibility:visible;
}

.loader-box{
text-align:center;
}

.loader-ring{
width:110px;
height:110px;
border-radius:50%;
border:5px solid rgba(255,255,255,0.12);
border-top:5px solid #00e5ff;
margin:auto;
animation:spin 1s linear infinite;

box-shadow:
0 0 25px rgba(0,229,255,0.45),
0 0 70px rgba(0,229,255,0.18);
}

.loader-box h2{
margin-top:35px;
font-family:'Orbitron',sans-serif;
letter-spacing:3px;
font-size:28px;
color:#00e5ff;
}

.loader-box p{
margin-top:10px;
opacity:0.7;
font-size:15px;
}

@keyframes spin{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

}

</style>

<script>

const registerBtn = document.getElementById('registerBtn');

const loadingScreen = document.getElementById('loadingScreen');

registerBtn.addEventListener('click', function(e){

e.preventDefault();

/* SHOW LOADING */

loadingScreen.classList.add('active');

/* REDIRECT */

setTimeout(function(){

window.location.href = "https://ticketdigitalstore.github.io/REGISTRASI-PENDAFTARAN/";

},3000);

});

</script>
